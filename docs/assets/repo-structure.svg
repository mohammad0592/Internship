<svg width="680" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Repository structure</title>
  <desc>Folder tree for the recommender systems internship code repository</desc>

  <style>
    text { font-family: ui-monospace, monospace; font-size: 13px; fill: #1a1a1a; }
    .label-bold { font-weight: 600; }
    .label-muted { fill: #6b7280; font-size: 12px; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.8; rx: 8; }
    .box-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.8; }
    .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.6; }
    .connector  { stroke: #9ca3af; stroke-width: 0.6; fill: none; }
  </style>

  <!-- Root -->
  <rect x="40" y="18" width="88" height="30" rx="8" class="box-purple"/>
  <text x="84" y="38" text-anchor="middle" class="label-bold" fill="#3C3489">code/</text>

  <!-- Vertical spine -->
  <line x1="84" y1="48" x2="84" y2="692" class="connector"/>

  <!-- ── tasks/ ── -->
  <line x1="84" y1="84" x2="128" y2="84" class="connector"/>
  <rect x="128" y="69" width="82" height="30" rx="8" class="box-teal"/>
  <text x="169" y="89" text-anchor="middle" class="label-bold" fill="#085041">tasks/</text>
  <line x1="169" y1="99" x2="169" y2="216" class="connector"/>

  <line x1="169" y1="126" x2="210" y2="126" class="connector"/>
  <rect x="210" y="111" width="92" height="30" rx="6" class="box-gray"/>
  <text x="256" y="131" text-anchor="middle" class="label-bold" fill="#2C2C2A">task-03/</text>
  <text x="312" y="131" class="label-muted">BPR · ml-100k · local</text>

  <line x1="169" y1="171" x2="210" y2="171" class="connector"/>
  <rect x="210" y="156" width="92" height="30" rx="6" class="box-gray"/>
  <text x="256" y="176" text-anchor="middle" class="label-bold" fill="#2C2C2A">task-04/</text>
  <text x="312" y="176" class="label-muted">BPR · Amazon · Colab</text>

  <line x1="169" y1="216" x2="210" y2="216" class="connector"/>
  <rect x="210" y="201" width="92" height="30" rx="6" class="box-gray"/>
  <text x="256" y="221" text-anchor="middle" class="label-bold" fill="#2C2C2A">task-05/</text>
  <text x="312" y="221" class="label-muted">5 models · Amazon · Colab</text>

  <!-- ── docs/ ── -->
  <line x1="84" y1="275" x2="128" y2="275" class="connector"/>
  <rect x="128" y="260" width="72" height="30" rx="8" class="box-teal"/>
  <text x="164" y="280" text-anchor="middle" class="label-bold" fill="#085041">docs/</text>
  <line x1="164" y1="290" x2="164" y2="414" class="connector"/>

  <line x1="164" y1="316" x2="210" y2="316" class="connector"/>
  <rect x="210" y="301" width="100" height="30" rx="6" class="box-gray"/>
  <text x="260" y="321" text-anchor="middle" class="label-bold" fill="#2C2C2A">results.md</text>
  <text x="320" y="321" class="label-muted">master summary table</text>

  <line x1="164" y1="361" x2="210" y2="361" class="connector"/>
  <rect x="210" y="346" width="72" height="30" rx="6" class="box-gray"/>
  <text x="246" y="366" text-anchor="middle" class="label-bold" fill="#2C2C2A">tasks/</text>
  <text x="292" y="366" class="label-muted">per-task results (03 – 05)</text>

  <line x1="164" y1="414" x2="210" y2="414" class="connector"/>
  <rect x="210" y="399" width="106" height="30" rx="6" class="box-gray"/>
  <text x="263" y="419" text-anchor="middle" class="label-bold" fill="#2C2C2A">comparisons/</text>
  <text x="326" y="419" class="label-muted">cross-task comparisons</text>

  <!-- ── log/ ── -->
  <line x1="84" y1="464" x2="128" y2="464" class="connector"/>
  <rect x="128" y="449" width="52" height="30" rx="8" class="box-teal"/>
  <text x="154" y="469" text-anchor="middle" class="label-bold" fill="#085041">log/</text>
  <text x="190" y="469" class="label-muted">BPR / NeuMF / LightGCN / SASRec / ItemKNN / DeepFM</text>

  <!-- ── saved/ ── -->
  <line x1="84" y1="524" x2="128" y2="524" class="connector"/>
  <rect x="128" y="509" width="72" height="30" rx="8" class="box-teal"/>
  <text x="164" y="529" text-anchor="middle" class="label-bold" fill="#085041">saved/</text>
  <line x1="164" y1="539" x2="164" y2="647" class="connector"/>

  <line x1="164" y1="557" x2="210" y2="557" class="connector"/>
  <rect x="210" y="542" width="92" height="30" rx="6" class="box-gray"/>
  <text x="256" y="562" text-anchor="middle" class="label-bold" fill="#2C2C2A">task-03/</text>
  <text x="312" y="562" class="label-muted">in git · 1.93 MB each</text>

  <line x1="164" y1="602" x2="210" y2="602" class="connector"/>
  <rect x="210" y="587" width="92" height="30" rx="6" class="box-gray"/>
  <text x="256" y="607" text-anchor="middle" class="label-bold" fill="#2C2C2A">task-04/</text>
  <text x="312" y="607" class="label-muted">Google Drive · 748 MB</text>

  <line x1="164" y1="647" x2="210" y2="647" class="connector"/>
  <rect x="210" y="632" width="92" height="30" rx="6" class="box-gray"/>
  <text x="256" y="652" text-anchor="middle" class="label-bold" fill="#2C2C2A">task-05/</text>
  <text x="312" y="652" class="label-muted">Google Drive · 5 models</text>

  <!-- ── root files ── -->
  <line x1="84" y1="692" x2="128" y2="692" class="connector"/>
  <rect x="128" y="677" width="62" height="30" rx="6" class="box-gray"/>
  <text x="159" y="697" text-anchor="middle" class="label-bold" fill="#2C2C2A">run.py</text>

  <rect x="204" y="677" width="124" height="30" rx="6" class="box-gray"/>
  <text x="266" y="697" text-anchor="middle" class="label-bold" fill="#2C2C2A">requirements.txt</text>

  <rect x="342" y="677" width="62" height="30" rx="6" class="box-gray"/>
  <text x="373" y="697" text-anchor="middle" class="label-bold" fill="#2C2C2A">colab/</text>
</svg>
